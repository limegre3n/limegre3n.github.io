<title>Kai Yuan Chua · DDSP</title>
<meta name="description" content="Kai Yuan Chua — Investments Associate at Digital Decarbonization Solutions Platform">
<meta property="og:title" content="Kai Yuan Chua · DDSP">

<meta name="theme-color" content="#3A3E50">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #2C3040;
    --card:    #3A3E50;
    --card2:   #424761;
    --line:    rgba(255,255,255,0.10);
    --white:   #FFFFFF;
    --muted:   rgba(255,255,255,0.52);
    --accent:  #7FD4B2;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'Sora', sans-serif;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    animation: up 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes up {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    padding: 2rem 2rem 1.6rem;
    border-bottom: 1px solid var(--line);
  }

  .logo-wrap {
    margin-bottom: 1.75rem;
  }

  .logo-wrap img {
    height: 22px;
    width: auto;
    display: block;
  }

  .name {
    font-size: 1.45rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 0.35rem;
  }

  .title {
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .company {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ── Contact rows ── */
  .contacts {
    padding: 1.1rem 2rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
  }

  .icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .row span {
    font-size: 0.83rem;
    font-weight: 300;
    color: var(--muted);
  }

  /* ── QR section ── */
  .qr-section {
    padding: 1.4rem 1.5rem 1.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .qr-box {
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    width: 240px;
    height: 240px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-box svg {
    display: block;
    width: 216px;
    height: 216px;
    flex-shrink: 0;
  }

  .qr-hint {
    font-size: 0.68rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
  }

  .save-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: #1e2530;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 9px 20px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }

  .save-btn:hover { opacity: 0.85; }

  .save-btn svg {
    width: 14px;
    height: 14px;
    stroke: #1e2530;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
